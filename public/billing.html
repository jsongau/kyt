<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KYT OS — Billing Cycle (Stedi)</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e16; --bg2:#0c111c; --panel:#111a28; --panel2:#16202f; --panel3:#1c2738;
  --border:#243044; --border-soft:#1b2434;
  --text:#e9eef6; --text2:#aeb9ca; --muted:#7c8aa0;
  --green:#1ec77d; --green-d:#16a065; --green-dim:#0f3b2c;
  --blue:#4f93e6; --blue-dim:#16314f;
  --gold:#e3a93a; --gold-dim:#3d2f12;
  --red:#e8635a; --red-dim:#3e1d1b; --pink:#d9697f;
  --purple:#9275e0; --purple-dim:#241a3d;
  --cyan:#37b6c9;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
.app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}

/* ===== sidebar ===== */
.side{background:var(--bg2);border-right:1px solid var(--border-soft);padding:16px 12px;display:flex;flex-direction:column;gap:3px}
.side-top{display:flex;align-items:center;justify-content:space-between;padding:4px 6px 14px}
.side-top b{font-size:17px;letter-spacing:-.01em}
.logout{font-size:11px;color:var(--muted);background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:5px 10px}
.office{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:13px;margin-bottom:6px}
.office .lab{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.office .nm{font-weight:700;font-size:15px;margin-top:3px}
.office .meta{font-size:12px;color:var(--text2);margin-top:1px}
.office .meta.s{color:var(--muted)}
.office .chg{margin-top:10px;font-size:11.5px;color:var(--text2);background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:6px 10px;width:100%}
.office .id{font-size:10px;color:#46546a;margin-top:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.side-sec{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:14px 8px 6px;border-top:1px solid var(--border-soft);margin-top:8px}
.snav{display:block;width:100%;text-align:left;background:none;border:0;color:var(--text2);font-size:13.5px;font-weight:500;padding:9px 11px;border-radius:8px}
.snav:hover{background:var(--panel);color:var(--text)}
.snav.on{background:var(--panel2);color:#fff;font-weight:600}

/* ===== main ===== */
.main{overflow:auto;max-height:100vh}
.head{padding:20px 28px 0;display:flex;align-items:flex-start;gap:18px;flex-wrap:wrap}
.head h1{margin:0;font-size:26px;font-weight:700;color:var(--green);letter-spacing:-.01em}
.head h1.ortho{color:var(--purple)}
.head .sub{font-size:13px;color:var(--muted);margin-top:3px}
.head .acts{margin-left:auto;display:flex;gap:9px}
.tabtn{background:var(--panel);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:600;border-radius:9px;padding:9px 16px}
.tabtn:hover{border-color:#33425c}
.tabtn.green{background:var(--green);border-color:var(--green);color:#04140d}
.tabtn.green:hover{background:var(--green-d)}
.tabtn.on{outline:2px solid var(--purple);color:#fff}

/* ===== billing cycle stepper ===== */
.cycle{margin:18px 28px 0;background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.cycle-h{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.cycle-h .t{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}
.cycle-h .vyne{margin-left:auto;font-size:11px;color:var(--muted)}
.cycle-h .vyne b{color:var(--green)}
.steps{display:flex;align-items:stretch;gap:0;overflow-x:auto}
.step{flex:1;min-width:104px;position:relative;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;margin-right:16px;transition:.15s;text-align:left}
.step:last-child{margin-right:0}
.step::after{content:'›';position:absolute;right:-13px;top:50%;transform:translateY(-50%);color:#3a4861;font-size:18px;font-weight:700}
.step:last-child::after{display:none}
.step:hover{border-color:#3a4d6b}
.step.on{border-color:var(--green);box-shadow:0 0 0 1px var(--green) inset}
.step .n{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.step .c{font-size:22px;font-weight:800;margin-top:2px;line-height:1}
.step .l{font-size:11.5px;color:var(--text2);margin-top:3px;line-height:1.25}
.step .x12{font-size:9.5px;color:var(--cyan);margin-top:4px;font-weight:600}
.step.s-stedi .c{color:var(--green)}
.step.s-pay .c{color:var(--gold)}
.step.s-done .c{color:var(--green)}

/* ===== filter chips ===== */
.payers{display:flex;gap:7px;overflow-x:auto;padding:16px 28px 0;scrollbar-width:thin}
.payers::-webkit-scrollbar{height:6px}
.pchip{flex:0 0 auto;background:var(--panel);border:1px solid var(--border);color:var(--text2);font-size:12.5px;font-weight:600;border-radius:999px;padding:7px 13px;white-space:nowrap}
.pchip.on{background:var(--panel3);color:#fff;border-color:#3a4d6b}
.status-row{display:flex;gap:9px;flex-wrap:wrap;padding:14px 28px 0}
.sbtn{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:9px 15px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.sbtn .ct{font-weight:800}
.sbtn.on{box-shadow:0 0 0 1px currentColor inset}
.sbtn.processed{color:var(--blue)} .sbtn.pending{color:var(--gold)} .sbtn.notpaid{color:var(--pink)}
.sbtn.rtb{color:var(--green)} .sbtn.writeoff{color:var(--text2)} .sbtn.deleted{color:var(--muted)}

/* ===== content ===== */
.wrap{padding:18px 28px 60px}
.search{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:11px 14px;margin-bottom:16px}
.search:focus{outline:none;border-color:#3a4d6b}
.sect{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:18px}
.sect-h{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 18px;border-bottom:1px solid var(--border-soft)}
.sect-h .ttl{font-size:16px;font-weight:700}
.sect-h .ttl .ct{color:var(--muted);font-weight:600}
.sect-h .hint{font-size:12px;color:var(--muted);text-align:right;max-width:46ch}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:10px 18px;background:var(--bg2)}
.tbl td{padding:13px 18px;border-top:1px solid var(--border-soft);vertical-align:top}
.tbl tr:hover td{background:var(--panel2)}
.tbl .pat{color:var(--green);font-weight:600;cursor:pointer}
.tbl .pat:hover{text-decoration:underline}
.codes{color:var(--text2);font-size:12.5px;max-width:420px;line-height:1.5}
.note-pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--green);background:var(--green-dim);border:1px solid #1c5440;border-radius:7px;padding:3px 9px}
.dash{color:#3c4a60}
.run{font-size:11.5px;font-weight:700;color:var(--gold);background:var(--gold-dim);border:1px solid #5a4719;border-radius:7px;padding:5px 11px}
.run:hover{background:#4a3a16}
.st{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;display:inline-block}
.st.processed,.st.paid,.st.accepted{color:var(--green);background:var(--green-dim)}
.st.pending,.st.partial{color:var(--gold);background:var(--gold-dim)}
.st.notpaid,.st.denied{color:var(--pink);background:var(--red-dim)}
.st.submitted{color:var(--cyan);background:#103038}
.st.rtb{color:var(--blue);background:var(--blue-dim)}
.st.writeoff{color:var(--text2);background:var(--panel3)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:600;font-size:13px;border-radius:9px;padding:9px 16px;border:1px solid transparent}
.btn-green{background:var(--green);color:#04140d;border-color:var(--green)}
.btn-green:hover{background:var(--green-d)}
.btn-gold{background:var(--gold);color:#1c1402;border-color:var(--gold)}
.btn-ghost{background:var(--panel2);border-color:var(--border);color:var(--text)}
.btn-ghost:hover{border-color:#3a4d6b}
.btn-red{background:var(--red-dim);border-color:#5a2420;color:var(--red)}
.btn[disabled]{opacity:.4;cursor:not-allowed}
.btn-sm{padding:6px 12px;font-size:12px}
.empty{padding:40px;text-align:center;color:var(--muted)}

/* ===== modal ===== */
.scrim{position:fixed;inset:0;background:rgba(4,7,12,.72);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;z-index:40;padding:40px 20px;overflow:auto}
.scrim.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:920px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.modal-h{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border-soft)}
.modal-h h2{margin:0;font-size:20px;font-weight:700}
.modal-h .who{font-size:13px;color:var(--muted);margin-top:3px}
.modal-h .close{background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:7px 14px}
.modal-b{padding:22px 24px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.mcard{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.mcard .ch{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.kv{display:flex;justify-content:space-between;gap:14px;padding:7px 0;border-bottom:1px solid var(--border-soft);font-size:13px}
.kv:last-child{border-bottom:0}
.kv .k{color:var(--muted)}
.kv .v{font-weight:600;text-align:right}
.field{margin-bottom:13px}
.field .l{display:block;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.field select,.field input{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:9px 11px}
.field select:focus,.field input:focus{outline:none;border-color:#3a4d6b}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.proc-list{margin-top:4px}
.proc{display:flex;justify-content:space-between;gap:12px;font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--border-soft)}
.proc .d{color:var(--text2)}
.proc:last-child{border-bottom:0}

/* preflight dial in modal */
.pfbox{grid-column:1 / -1;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px}
.pfrow{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.dial{width:104px;height:104px;border-radius:50%;display:grid;place-items:center;flex:0 0 104px}
.dial .in{width:82px;height:82px;border-radius:50%;background:var(--panel);display:grid;place-items:center;text-align:center}
.dial .n{font-size:30px;font-weight:800;line-height:1}
.dial .b{font-size:9px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;margin-top:2px}
.pfinfo{flex:1;min-width:240px}
.issues{list-style:none;margin:8px 0 0;padding:0;display:flex;flex-direction:column;gap:6px}
.issues li{display:flex;gap:8px;font-size:12.5px;align-items:flex-start}
.issues .mk{flex:0 0 16px;height:16px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:800;color:#04140d;margin-top:1px}
.mk.pass{background:var(--green)} .mk.warn{background:var(--gold);color:#1c1402} .mk.fail{background:var(--red);color:#fff}
.modal-f{padding:16px 24px;border-top:1px solid var(--border-soft);display:flex;gap:10px;align-items:center}
.modal-f .ids{font-size:11px;color:#46546a;margin-right:auto;font-family:ui-monospace,monospace}
.gen-narr{background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;padding:8px 13px;margin-top:6px}
.narr-out{margin-top:8px;font-size:12.5px;color:var(--text2);background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:11px;line-height:1.5;display:none}
.narr-out.show{display:block}

/* ===== ERA inbox ===== */
.era{display:grid;grid-template-columns:300px 1fr;gap:0;background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.era-list{border-right:1px solid var(--border-soft);max-height:600px;overflow:auto}
.era-list-h{padding:16px 18px 10px}
.era-list-h .t{font-size:15px;font-weight:700}
.era-list-h .s{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:4px}
.era-item{display:flex;justify-content:space-between;gap:10px;padding:13px 18px;border-top:1px solid var(--border-soft);cursor:pointer}
.era-item:hover{background:var(--panel2)}
.era-item.on{background:var(--panel2);box-shadow:inset 3px 0 0 var(--cyan)}
.era-item .nm{font-weight:600;font-size:13px}
.era-item .dt{font-size:11.5px;color:var(--muted);margin-top:2px}
.era-item .amt{font-weight:800;font-size:13px}
.era-item .amt.pos{color:var(--green)} .era-item .amt.zero{color:var(--muted)}
.era-detail{padding:20px 22px}
.era-pay{display:flex;gap:26px;flex-wrap:wrap;background:var(--panel2);border:1px solid var(--border);border-radius:11px;padding:14px 18px;margin-bottom:16px}
.era-pay .b{font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.era-pay .v{font-weight:700;margin-top:3px}
.era-pay .v.amt{color:var(--green)}
.era-claim .nm{font-size:18px;font-weight:700}
.era-claim .meta{font-size:12px;color:var(--muted);margin:3px 0 12px}
.tag-partial{color:var(--gold);font-weight:700;font-size:12px}
.era-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
.era-tbl th{text-align:left;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--border-soft)}
.era-tbl td{padding:9px 10px;border-bottom:1px solid var(--border-soft)}
.era-tbl .paid{color:var(--green)} .era-tbl .zero{color:var(--pink)}
.carc{font-size:10px;font-weight:700;color:var(--gold);background:var(--gold-dim);border-radius:5px;padding:1px 6px;margin-right:6px}
.match-box{background:var(--panel2);border:1px solid var(--border);border-radius:11px;padding:14px 16px}
.match-box .h{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.no-match{font-size:12px;font-weight:700;color:var(--gold);background:var(--gold-dim);border-radius:6px;padding:3px 9px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#04140d;font-weight:700;padding:12px 22px;border-radius:999px;font-size:13.5px;opacity:0;transition:.3s;z-index:60;box-shadow:0 14px 36px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.info{background:var(--cyan);color:#04161a}
@media(max-width:860px){.app{grid-template-columns:1fr}.side{display:none}.modal-b{grid-template-columns:1fr}.era{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR (mirrors real KYT OS) -->
  <aside class="side">
    <div class="side-top"><b>KYT OS</b><button class="logout">Log out</button></div>
    <div class="office">
      <div class="lab">Office</div>
      <div class="nm">KYT Dental Services</div>
      <div class="meta">Fountain Valley</div>
      <div class="meta s">Supervisor</div>
      <button class="chg">Change office</button>
      <div class="id">8a4080ce-210f-4650-9c95-f227de…</div>
    </div>
    <div class="side-sec">Stations</div>
    <button class="snav">Dashboard</button>
    <button class="snav">Time &amp; Pay</button>
    <button class="snav">Lab</button>
    <button class="snav">Patients</button>
    <button class="snav on">Insurance</button>
    <button class="snav">HR</button>
    <button class="snav">Training</button>
    <button class="snav">Schedule</button>
    <button class="snav">Inventory</button>
    <button class="snav">Account</button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="head">
      <div>
        <h1 id="h1">Claims (Tracker)</h1>
        <div class="sub">Office: KYT Dental Services — Fountain Valley · <b style="color:var(--green)">Billing on Stedi</b></div>
      </div>
      <div class="acts">
        <button class="tabtn green" data-act="new">New Claim</button>
        <button class="tabtn" data-act="ortho">Ortho</button>
        <button class="tabtn" data-act="corrective">Corrective</button>
        <button class="tabtn" data-act="era">ERA</button>
      </div>
    </div>

    <!-- BILLING CYCLE STEPPER -->
    <div class="cycle">
      <div class="cycle-h">
        <span class="t">Billing cycle</span>
        <span class="vyne">Replaces iDentalSoft + Vyne · now <b>KYT OS → Stedi → Payers</b></span>
      </div>
      <div class="steps" id="steps"></div>
    </div>

    <!-- PAYER + STATUS FILTERS -->
    <div class="payers" id="payers"></div>
    <div class="status-row" id="statusRow"></div>

    <div class="wrap" id="wrap"></div>
  </main>
</div>

<!-- CLAIM MODAL -->
<div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>
<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ===================== CDT ===================== */
const CDT={
 D0120:{d:'Periodic oral evaluation',fee:7000}, D0140:{d:'Limited oral evaluation',fee:9500},
 D0150:{d:'Comprehensive oral evaluation',fee:11000}, D0210:{d:'Intraoral complete series (FMX)',fee:13000},
 D0220:{d:'Periapical first film',fee:3500}, D0230:{d:'Periapical add’l film',fee:2800},
 D0274:{d:'Bitewings — four films',fee:7500}, D0431:{d:'Adjunctive caries test',fee:4500},
 D0470:{d:'Diagnostic casts',fee:9000}, D0801:{d:'3D dental surface scan',fee:8500},
 D1110:{d:'Prophylaxis — adult',fee:15000}, D1206:{d:'Topical fluoride varnish',fee:6500},
 D1310:{d:'Nutritional counseling',fee:4000}, D1330:{d:'Oral hygiene instructions',fee:4000},
 D2392:{d:'Resin composite — 2 surf, posterior',fee:35000,tooth:true,surface:true,xray:true},
 D2393:{d:'Resin composite — 3 surf, posterior',fee:35000,tooth:true,surface:true,xray:true},
 D2740:{d:'Crown — porcelain/ceramic',fee:130000,tooth:true,xray:true,narrative:true},
 D2950:{d:'Core build-up',fee:35000,tooth:true,xray:true,narrative:true},
 D3330:{d:'Root canal — molar',fee:140000,tooth:true,xray:true,narrative:true},
 D4341:{d:'Scaling/root planing (quad)',fee:32000,perio:true,xray:true,narrative:true},
 D7140:{d:'Extraction',fee:25000,tooth:true,xray:true,narrative:true},
 D8090:{d:'Comprehensive ortho — adult',fee:550000,narrative:true}
};
function codeList(arr){return arr.map(c=>c.t?`${c.code} #${c.t}`:c.code).join(', ')}

/* ===================== SEED DATA ===================== */
/* Ready to Bill — real patients/codes from the chart */
function L(code,t,s){return {code,t:t||'',s:s||''}}
let RTB=[
 {id:'c1',dos:'2026-06-15',pat:'Dustin Sallen',payer:'UnitedHealthcare',coverage:'Primary',note:true,perio:false,
   lines:[L('D0120'),L('D1110'),L('D1206'),L('D8090')], split:[['Orthodontic Case',['D8090']],['Preventive / Diagnostic',['D0120','D1110','D1206']]]},
 {id:'c2',dos:'2026-06-12',pat:'Vannie Pham',payer:'Aetna',coverage:'Primary',note:true,perio:false,lines:[L('D0140'),L('D0220')]},
 {id:'c3',dos:'2026-06-12',pat:'Jessica Cortez',payer:'Cigna',coverage:'Primary',note:true,perio:false,
   lines:[L('D0220','8'),L('D0220','9'),L('D0230','24'),L('D0230','25'),L('D0120'),L('D0274'),L('D1110'),L('D1206')]},

/* ===================== CLAIM DETAIL + PRE-FLIGHT ===================== */
function preflight(r){
 const issues=[]; let hard=false;
 const push=(sev,msg,h)=>{issues.push({sev,msg});if(h)hard=true};
 r.pat?push('pass','Patient linked ('+r.pat+')'):push('fail','Patient missing',true);
 r.payer?push('pass','Payer + Stedi ID selected ('+r.payer+')'):push('fail','Payer ID missing',true);
 push('pass','Billing + rendering provider (Isaac Sun, NPI 1417403395)');
 push('pass','Tax ID 33-4876001 present');
 r.dos?push('pass','Date of service valid'):push('fail','DOS missing',true);
 r.lines.length?push('pass',r.lines.length+' procedure line(s) with fees'):push('fail','No procedures',true);
 let needXray=false,needNarr=false,needPerio=false,needTooth=false;
 r.lines.forEach(l=>{const m=CDT[l.code]||{};
   if(m.tooth&&!l.t)needTooth=true; if(m.xray)needXray=true; if(m.narrative)needNarr=true; if(m.perio)needPerio=true;});
 if(needTooth)push('fail','Tooth number required on a tooth-specific code',true);
 if(needPerio&&!r.perio)push('fail','Perio chart required (SRP/perio code)',true);
 if(needXray)push(r.xrayDone?'pass':'warn',(r.xrayDone?'X-ray attached':'X-ray recommended for restorative/major code'));
 if(needNarr)push(r.narrDone?'pass':'warn',(r.narrDone?'Narrative written':'Narrative needed for major/ortho code'));
 if(!needXray&&!needNarr&&!needPerio)push('pass','No attachment/narrative required for this code set');
 const fails=issues.filter(i=>i.sev==='fail').length, warns=issues.filter(i=>i.sev==='warn').length;
 let score=100-fails*22-warns*7; if(hard)score=Math.min(score,45); score=Math.max(0,Math.min(100,score));
 let band=score>=100?'Ready':score>=80?'Minor warning':score>=50?'Needs review':'Blocked';
 return {score,band,issues,canSubmit:score>=80&&!hard};
}
function dialColor(s){return s>=100?'var(--green)':s>=50?'var(--gold)':'var(--red)'}

 const col=dialColor(pf.score);
 $('#modal').innerHTML=`
  <div class="modal-h"><div><h2>Claim Builder — 837D</h2><div class="who">${r.pat} · DOS ${fmtDate(r.dos)} · ${r.payer} (${r.coverage})</div></div>

    </div>

        <div class="narr-out" id="m_narrout"></div>
      </div>
    </div>
    <div class="pfbox"><div class="ch" style="font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Pre-Flight — readiness before submission</div>
      <div class="pfrow">
        <div class="dial" style="background:conic-gradient(${col} ${pf.score*3.6}deg, var(--panel2) 0)"><div class="in"><div><div class="n" style="color:${col}">${pf.score}</div><div class="b" style="color:${col}">${pf.band}</div></div></div></div>

  </div>`;
 $('#scrim').classList.add('show');
 const rerun=()=>{ r.xrayDone=$('#m_xray').checked; r.perio=$('#m_perio').checked; r.narrDone=$('#m_narr').checked; persist(); openClaim(id); };

 $('#m_gen').addEventListener('click',()=>{const o=$('#m_narrout');o.textContent='Caries removal and cavity preparation completed on '+(r.lines.find(l=>CDT[l.code]&&CDT[l.code].tooth)?'tooth #'+(r.lines.find(l=>l.t)||{}).t:'the indicated tooth')+'. Radiograph supports the restoration. No pulpal involvement noted. Occlusion verified; patient tolerated the procedure well. (Billing-support language — provider review required before sign-off.)';o.classList.add('show');toast('Narrative drafted — sign to finalize',true)});

}
function submitClaim(id){
 const idx=RTB.findIndex(x=>x.id===id); const r=RTB[idx];
 const charge=r.lines.reduce((s,l)=>s+(CDT[l.code]?CDT[l.code].fee:0),0);
 CLAIMS.unshift({id:'n'+Date.now(),dos:r.dos,pat:r.pat,payer:r.payer,code:codeList(r.lines).slice(0,40),charge,
   status:'Accepted by Stedi',sub:new Date().toISOString().slice(0,10),pcn:Math.random().toString(36).slice(2,9),ref:'(awaiting payer)',
   stage:'accepted',next:'Await payer adjudication',follow:'in 7 days',staff:'You'});

function eraMarkup(){
 const e=ERAS.find(x=>x.id===eraSel);
 const tag=e.denied?'<span class="tag-partial" style="color:var(--pink)">Denied</span>':e.partial?'<span class="tag-partial">Partial</span>':'<span class="tag-partial" style="color:var(--green)">Paid in full</span>';
 const match=CLAIMS.find(c=>c.pat===e.pat)||RTB.find(c=>c.pat===e.pat);
 return `<div class="modal-h"><div><h2>ERA Inbox — Stedi 835</h2><div class="who">Electronic remittance · auto-received from Stedi · matched by Patient Control Number</div></div>
   <button class="close" onclick="closeModal()">Close</button></div>
  <div class="era" style="border:0;border-radius:0">
   <div class="era-list">
     <div class="era-list-h"><div class="t">835 Transactions</div><div class="s">${ERAS.length} remittances</div></div>
     ${ERAS.map(x=>`<div class="era-item ${x.id===eraSel?'on':''}" data-era="${x.id}"><div><div class="nm">${x.pat}</div><div class="dt">${fmtDate(x.date)} · ${x.payer.slice(0,22)}${x.payer.length>22?'…':''}</div></div><div class="amt ${x.amt>0?'pos':'zero'}">${money(x.amt)}</div></div>`).join('')}
   </div>
   <div class="era-detail">
     <div class="era-pay">
       <div><div class="b">Payer</div><div class="v">${e.payer}</div></div>
       <div><div class="b">Check date</div><div class="v">${fmtDate(e.check)}</div></div>
       <div><div class="b">Amount</div><div class="v amt">${money(e.amt)}</div></div>
       <div><div class="b">Trace #</div><div class="v">${e.trace}</div></div>
     </div>
     <div class="era-claim">
       <div style="display:flex;justify-content:space-between;align-items:center"><div class="nm">${e.pat}</div>${tag}</div>
       <div class="meta">Claim # ${e.claimNo} · Billed ${money(e.billed)} · Ins paid <b style="color:var(--green)">${money(e.paid)}</b> · Pt resp <b style="color:var(--gold)">${money(e.resp)}</b></div>
       <table class="era-tbl"><thead><tr><th>Code</th><th>Billed</th><th>Paid</th><th>Reason</th></tr></thead><tbody>
         ${e.lines.map(([c,b,p,r])=>`<tr><td><b>${c}</b> <span style="color:var(--muted)">${(CDT[c]||{}).d||''}</span></td><td>${money(b)}</td><td class="${p>0?'paid':'zero'}">${money(p)}</td><td>${r?`<span class="carc">${r}</span>${reasonText(r)}`:'<span style="color:var(--muted)">—</span>'}</td></tr>`).join('')}
       </tbody></table>
       <div class="match-box">
         <div class="h">Match to KYT claim</div>
         ${match?`<div style="font-size:13px">Auto-matched → <b style="color:var(--green)">${match.pat}</b> ${match.code?'· '+match.code:''} <span style="color:var(--muted)">(by PCN + line control #)</span></div>`:`<div style="display:flex;gap:10px;align-items:center"><span class="no-match">No auto-match</span><span style="font-size:12px;color:var(--muted)">search to link manually</span></div>`}
         <div style="margin-top:12px;display:flex;gap:9px;flex-wrap:wrap">
           <button class="btn btn-green btn-sm" onclick="toast('Payment posted · claim → ${e.partial?'Partially Paid':e.denied?'Denied':'Paid'}',true)">${e.denied?'Review denial':'Post payment'}</button>
           ${e.partial||e.denied?`<button class="btn btn-ghost btn-sm" onclick="toast('Appeal drafted — status → Appeal Needed')">Create appeal</button><button class="btn btn-ghost btn-sm" onclick="toast('Moved to Write-off Review')">Write-off review</button>`:''}
           <button class="btn btn-ghost btn-sm" onclick="toast('Patient balance ${money(e.resp)} generated')">Generate patient balance</button>
         </div>
       </div>
     </div>
   </div>
  </div>
  <div class="modal-f"><span class="ids">835 auto-received via Stedi · poll or webhook</span><button class="btn btn-ghost" onclick="closeModal()">Close</button></div>`;
}
function reasonText(c){return ({'PR-96':'Non-covered charge (patient resp.)','CO-45':'Charge exceeds fee schedule (write-off)','CO-197':'Precert/authorization absent'})[c]||''}
function wireERA(){ $$('[data-era]').forEach(b=>b.addEventListener('click',()=>{eraSel=b.dataset.era;$('#modal').innerHTML=eraMarkup();wireERA();})); }

/* ===================== TOP ACTIONS ===================== */
$$('.acts .tabtn').forEach(b=>b.addEventListener('click',()=>{
 const a=b.dataset.act;
 if(a==='era')openERA();
 else if(a==='new'){activeStatus='Ready to Bill';orthoMode=false;render();toast('Pick a Ready-to-Bill visit to build its claim',true)}
 else if(a==='ortho'){orthoMode=!orthoMode;activeStatus='Ready to Bill';render()}
 else if(a==='corrective'){activeStatus='Not Paid';render();toast('Corrective/appeal works from denied claims',true)}
}));

/* ===================== BOOT ===================== */
render();
</script>
</body>
</html>
